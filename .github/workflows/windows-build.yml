name: Build Banjofy 006.4.0 Module 17 Integration Build 002

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify clean integration replacements
        shell: pwsh
        run: |
          $required = @(
            "replacements/module17integration/main_window.py",
            "replacements/module17integration/timing_analyzer.py",
            "replacements/module17integration/chord_engine.py",
            "replacements/module17integration/requirements.txt",
            "replacements/module17integration/Banjofy_Module17.spec"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Missing: $file" }
          }

      - name: Clone confirmed dedicated ChordMini model
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ptnghia-j/ChordMini.git ChordMini
          if (-not (Test-Path "ChordMini/checkpoints/2e1d_model_best.pth")) { throw "ChordNet checkpoint missing" }
          if (-not (Test-Path "ChordMini/src/evaluation/test.py")) { throw "ChordMini inference script missing" }
          if (-not (Test-Path "ChordMini/config/ChordMini.yaml")) { throw "ChordMini configuration missing" }

      - name: Preserve current repository window
        shell: pwsh
        run: Copy-Item "src/banjofy/ui/main_window.py" "src/banjofy/ui/main_window_legacy.py" -Force

      - name: Install Module 17 Integration Build 002 source
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "src/banjofy/analysis" | Out-Null
          if (-not (Test-Path "src/banjofy/analysis/__init__.py")) { New-Item -ItemType File "src/banjofy/analysis/__init__.py" | Out-Null }
          Copy-Item "replacements/module17integration/main_window.py" "src/banjofy/ui/main_window.py" -Force
          Copy-Item "replacements/module17integration/timing_analyzer.py" "src/banjofy/ui/timing_analyzer.py" -Force
          Copy-Item "replacements/module17integration/chord_engine.py" "src/banjofy/analysis/chord_engine.py" -Force
          Copy-Item "replacements/module17integration/requirements.txt" "requirements.txt" -Force
          Copy-Item "replacements/module17integration/Banjofy_Module17.spec" "Banjofy_Module17.spec" -Force

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r requirements.txt

      - name: Verify full runtime import chain
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD/src;$PWD/ChordMini"
          python -c "import PySide6, torch, librosa, numpy, scipy.signal, mir_eval, imageio_ffmpeg, seaborn, pandas, matplotlib, tqdm, soundfile, yaml; print('All runtime imports available')"
          python -c "from src.evaluation.utils import quality_analysis; from src.models import load_model; print('ChordMini imports available')"
          python -c "from banjofy.analysis import chord_engine as c; print('\n'.join(c.run_internal_self_audit()))"

      - name: Compile-check integrated sources
        run: |
          python -m py_compile src/banjofy/ui/main_window.py
          python -m py_compile src/banjofy/ui/timing_analyzer.py
          python -m py_compile src/banjofy/analysis/chord_engine.py

      - name: Verify packaged FFmpeg
        run: python -c "import imageio_ffmpeg, os; p=imageio_ffmpeg.get_ffmpeg_exe(); assert os.path.exists(p); print('FFmpeg available:', p)"

      - name: Build integrated Windows EXE
        run: pyinstaller Banjofy_Module17.spec

      - name: Confirm EXE exists
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/Banjofy.exe")) { throw "Expected Banjofy.exe was not produced" }

      - name: Upload integrated EXE
        uses: actions/upload-artifact@v4
        with:
          name: Banjofy-006.4.0-Module-17-Integration-Build-002-Windows
          path: dist/Banjofy.exe

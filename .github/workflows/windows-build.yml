name: Build Banjofy Module 17 Build 017

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      PYTHONPATH: ${{ github.workspace }}\src

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Build 017 clean-rebuild files
        shell: pwsh
        run: |
          $required = @(
            "replacements/module17integration/main_window.py",
            "replacements/module17integration/timing_analyzer.py",
            "replacements/module17integration/chord_engine.py",
            "replacements/module17integration/audio_downloader.py",
            "replacements/module17integration/requirements.txt",
            "replacements/module17integration/Banjofy_Module17.spec",
            "replacements/module17integration/RUNTIME_VERSIONS.json"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Missing Build 017 file: $file" }
          }

      - name: Preserve repository window
        shell: pwsh
        run: Copy-Item "src/banjofy/ui/main_window.py" "src/banjofy/ui/main_window_legacy.py" -Force

      - name: Install complete Build 017 source
        shell: pwsh
        run: |
          Copy-Item "replacements/module17integration/main_window.py" "src/banjofy/ui/main_window.py" -Force
          Copy-Item "replacements/module17integration/timing_analyzer.py" "src/banjofy/ui/timing_analyzer.py" -Force
          Copy-Item "replacements/module17integration/chord_engine.py" "src/banjofy/analysis/chord_engine.py" -Force
          Copy-Item "replacements/module17integration/audio_downloader.py" "src/banjofy/download/audio_downloader.py" -Force
          Copy-Item "replacements/module17integration/requirements.txt" "requirements.txt" -Force
          Copy-Item "replacements/module17integration/Banjofy_Module17.spec" "Banjofy_Module17.spec" -Force



      - name: Clone dedicated ChordMini model
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ptnghia-j/ChordMini.git ChordMini
          if ($LASTEXITCODE -ne 0) { throw "ChordMini clone failed" }
          if (-not (Test-Path "ChordMini/checkpoints/2e1d_model_best.pth")) { throw "ChordNet checkpoint missing" }
          if (-not (Test-Path "ChordMini/src/evaluation/test.py")) { throw "ChordMini inference script missing" }
          if (-not (Test-Path "ChordMini/config/ChordMini.yaml")) { throw "ChordMini configuration missing" }

      - name: Install pinned Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          if ($LASTEXITCODE -ne 0) { throw "pip and wheel upgrade failed" }

          python -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) { throw "requirements installation failed" }

          python -m pip install pyinstaller==6.14.2
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller installation failed" }

      - name: Verify confirmed Laboratory 016 and Module 17 dependencies
        shell: pwsh
        run: |
          python -c "import torch, librosa, numpy, scipy.signal, mir_eval, imageio_ffmpeg, seaborn, pandas, matplotlib, tqdm, soundfile, yaml; print('Confirmed Laboratory 016 runtime imports available')"
          if ($LASTEXITCODE -ne 0) { throw "Laboratory 016 runtime import chain failed" }

          python -c "import yt_dlp; print('yt-dlp', yt_dlp.version.__version__)"
          if ($LASTEXITCODE -ne 0) { throw "yt-dlp import failed" }

          python -c "import curl_cffi; print('curl-cffi import: passed')"
          if ($LASTEXITCODE -ne 0) { throw "curl-cffi import failed" }

          python -c "import PySide6; print('PySide6', PySide6.__version__)"
          if ($LASTEXITCODE -ne 0) { throw "PySide6 import failed" }

          python -c "import importlib.metadata as m; print('bgutil', m.version('bgutil-ytdlp-pot-provider')); print('yt-dlp-ejs', m.version('yt-dlp-ejs'))"
          if ($LASTEXITCODE -ne 0) { throw "Modern downloader package metadata verification failed" }

      - name: Verify frozen pkg_resources runtime chain
        shell: pwsh
        run: |
          python -c "import pkg_resources, jaraco.text, jaraco.context, backports.tarfile; assert jaraco.text.__file__; assert jaraco.context.__file__; assert backports.tarfile.__file__; print('pkg_resources jaraco backports runtime chain: passed'); print('jaraco.text file:', jaraco.text.__file__); print('jaraco.context file:', jaraco.context.__file__); print('backports.tarfile file:', backports.tarfile.__file__)"
          if ($LASTEXITCODE -ne 0) { throw "pkg_resources runtime chain import failed" }

          python -c "import importlib.metadata as m; print('backports.tarfile', m.version('backports.tarfile'))"
          if ($LASTEXITCODE -ne 0) { throw "backports.tarfile metadata check failed" }

      - name: Early application import gate
        shell: pwsh
        run: |
          python -c "import banjofy; print('banjofy package import: passed')"
          python -c "from banjofy.ui.main_window import MainWindow; print('main window import: passed')"
          python -c "from banjofy.ui.timing_analyzer import TimingAnalyzer; print('timing analyzer import: passed')"
          python -c "from banjofy.analysis.chord_engine import ChordEngine; print('chord engine import: passed')"
          python -c "from banjofy.download.audio_downloader import DownloadManager; print('downloader import: passed')"

      - name: Download pinned Deno 2.8.1
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force runtime | Out-Null
          $url = "https://github.com/denoland/deno/releases/download/v2.8.1/deno-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile "runtime/deno.zip"
          Expand-Archive "runtime/deno.zip" -DestinationPath "runtime" -Force
          Remove-Item "runtime/deno.zip"
          if (-not (Test-Path "runtime/deno.exe")) { throw "deno.exe missing" }
          & "runtime/deno.exe" --version

      - name: Prepare pinned bgutil PO-token provider 1.3.1
        shell: pwsh
        run: |
          git clone --depth 1 --branch 1.3.1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git runtime/bgutil-ytdlp-pot-provider
          Push-Location runtime/bgutil-ytdlp-pot-provider/server
          & "$env:GITHUB_WORKSPACE/runtime/deno.exe" install --allow-scripts=npm:canvas --frozen
          Pop-Location
          if (-not (Test-Path "runtime/bgutil-ytdlp-pot-provider/server/node_modules")) {
            throw "bgutil provider node_modules missing"
          }

      - name: Stage exact installed bgutil plugin for portable EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "portable_plugins/bgutil-ytdlp-pot-provider" | Out-Null

          python -c "import importlib.metadata as m, pathlib, shutil; d=m.distribution('bgutil-ytdlp-pot-provider'); files=[f for f in (d.files or []) if 'yt_dlp_plugins' in f.parts and f.suffix=='.py']; assert files, 'No yt_dlp_plugins Python files in installed bgutil distribution'; root=pathlib.Path('portable_plugins/bgutil-ytdlp-pot-provider'); [(lambda src,dst: (dst.parent.mkdir(parents=True, exist_ok=True), shutil.copy2(src,dst)))(pathlib.Path(d.locate_file(f)), root/pathlib.Path(*f.parts[f.parts.index('yt_dlp_plugins'):])) for f in files]; print('\n'.join(str(root/pathlib.Path(*f.parts[f.parts.index('yt_dlp_plugins'):])) for f in files))"
          if ($LASTEXITCODE -ne 0) { throw "Portable bgutil plugin staging failed" }

          $pluginFiles = Get-ChildItem "portable_plugins/bgutil-ytdlp-pot-provider/yt_dlp_plugins" -Recurse -Filter "getpot_bgutil*.py"
          if (-not $pluginFiles) { throw "No staged bgutil provider plugin modules found" }

          $pluginRoot = (Resolve-Path "portable_plugins").Path
          python -c "from pathlib import Path; from yt_dlp.globals import plugin_dirs; from yt_dlp.plugins import load_all_plugins; root=Path(r'$pluginRoot').resolve(); plugin_dirs.value=[str(root)]; load_all_plugins(); import yt_dlp_plugins.extractor.getpot_bgutil as base; import yt_dlp_plugins.extractor.getpot_bgutil_http as http; import yt_dlp_plugins.extractor.getpot_bgutil_script as script; print('portable plugin API activation: passed'); print(base.__file__); print(http.__file__); print(script.__file__)"
          if ($LASTEXITCODE -ne 0) { throw "yt-dlp portable plugin API activation failed" }

          python -m yt_dlp --plugin-dirs "$pluginRoot" --verbose --list-extractors 2>&1 | Tee-Object -FilePath "PORTABLE_PLUGIN_CHECK.txt"
          if ($LASTEXITCODE -ne 0) { throw "yt-dlp extractor initialization failed" }
          if (-not (Select-String -Path "PORTABLE_PLUGIN_CHECK.txt" -Pattern "Plugin directories:" -Quiet)) {
            throw "yt-dlp extractor initialization did not report plugin directories"
          }
          if (Select-String -Path "PORTABLE_PLUGIN_CHECK.txt" -Pattern "Plugin directories: none" -Quiet) {
            throw "yt-dlp extractor initialization reported no plugin directory"
          }

      - name: Record exact dependency versions
        shell: pwsh
        run: |
          python -c "import yt_dlp; print('yt-dlp', yt_dlp.version.__version__)"
          python -c "import importlib.metadata as m; print('yt-dlp-ejs', m.version('yt-dlp-ejs')); print('bgutil', m.version('bgutil-ytdlp-pot-provider')); print('curl-cffi', m.version('curl-cffi')); print('librosa', m.version('librosa'))"
          & "runtime/deno.exe" --version
          python -c "import imageio_ffmpeg; print('ffmpeg', imageio_ffmpeg.get_ffmpeg_version())"
          python -m pip freeze | Out-File -Encoding utf8 BUILD_DEPENDENCY_LOCK.txt

      - name: Compile and internal audits
        run: |
          python -m py_compile src/main.py
          python -m py_compile src/banjofy/ui/main_window.py
          python -m py_compile src/banjofy/ui/timing_analyzer.py
          python -m py_compile src/banjofy/analysis/chord_engine.py
          python -m py_compile src/banjofy/download/audio_downloader.py
          python -c "from banjofy.analysis import chord_engine as c; print('\n'.join(c.run_internal_self_audit()))"
          python -c "from banjofy.ui import timing_analyzer as t; print('\n'.join(t.run_internal_timing_audit()))"

      - name: Verify modern downloader components
        shell: pwsh
        run: |
          python -c "from yt_dlp import YoutubeDL; import yt_dlp; print('yt-dlp API', yt_dlp.version.__version__)"
          python -c "import yt_dlp_plugins; print('yt-dlp plugin namespace available')"
          if (-not (Test-Path "portable_plugins/bgutil-ytdlp-pot-provider/yt_dlp_plugins")) { throw "Portable plugin namespace missing" }
          if (-not (Get-ChildItem "portable_plugins/bgutil-ytdlp-pot-provider/yt_dlp_plugins" -Recurse -Filter "getpot_bgutil*.py")) { throw "Portable bgutil plugin modules missing" }
          if (-not (Test-Path "runtime/deno.exe")) { throw "Deno missing" }
          if (-not (Test-Path "runtime/bgutil-ytdlp-pot-provider/server/package.json")) { throw "Provider source missing" }
          if (-not (Test-Path "runtime/bgutil-ytdlp-pot-provider/server/node_modules")) { throw "Provider dependencies missing" }


      - name: Verify ChordMini import and runtime assets
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$env:GITHUB_WORKSPACE/src;$env:GITHUB_WORKSPACE/ChordMini"

          python -c "from src.evaluation.utils import quality_analysis; print('ChordMini evaluation import: passed')"
          if ($LASTEXITCODE -ne 0) { throw "ChordMini evaluation import failed" }

          python -c "from src.models import load_model; print('ChordMini model loader import: passed')"
          if ($LASTEXITCODE -ne 0) { throw "ChordMini model loader import failed" }

          python -c "from banjofy.analysis.chord_engine import chordmini_root; p=chordmini_root(); print('ChordMini runtime root:', p); assert (p/'checkpoints/2e1d_model_best.pth').exists(); assert (p/'src/evaluation/test.py').exists(); assert (p/'config/ChordMini.yaml').exists()"
          if ($LASTEXITCODE -ne 0) { throw "ChordMini runtime path verification failed" }

      - name: Build Windows EXE
        shell: pwsh
        run: |
          pyinstaller Banjofy_Module17.spec
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller build failed" }
          if (-not (Test-Path "dist/Banjofy.exe")) { throw "Banjofy.exe missing after PyInstaller" }

      - name: Smoke-test built Banjofy EXE startup
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "$env:GITHUB_WORKSPACE/dist/Banjofy.exe" -PassThru
          Start-Sleep -Seconds 10

          if ($process.HasExited) {
            throw "Banjofy.exe exited during startup smoke test with code $($process.ExitCode)"
          }

          Stop-Process -Id $process.Id -Force
          Start-Sleep -Seconds 2
          Write-Host "Banjofy.exe startup smoke test passed"

      - name: Assemble complete Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "dist/Banjofy-Module17-Build017/runtime" | Out-Null
          New-Item -ItemType Directory -Force "dist/Banjofy-Module17-Build017/yt-dlp-plugins" | Out-Null
          Copy-Item "dist/Banjofy.exe" "dist/Banjofy-Module17-Build017/Banjofy.exe" -Force
          Copy-Item "runtime/deno.exe" "dist/Banjofy-Module17-Build017/runtime/deno.exe" -Force
          Copy-Item "runtime/bgutil-ytdlp-pot-provider" "dist/Banjofy-Module17-Build017/runtime/bgutil-ytdlp-pot-provider" -Recurse -Force
          Copy-Item "portable_plugins/bgutil-ytdlp-pot-provider" "dist/Banjofy-Module17-Build017/yt-dlp-plugins/bgutil-ytdlp-pot-provider" -Recurse -Force
          Copy-Item "BUILD_DEPENDENCY_LOCK.txt" "dist/Banjofy-Module17-Build017/BUILD_DEPENDENCY_LOCK.txt" -Force
          Copy-Item "replacements/module17integration/RUNTIME_VERSIONS.json" "dist/Banjofy-Module17-Build017/RUNTIME_VERSIONS.json" -Force
          if (-not (Test-Path "dist/Banjofy-Module17-Build017/Banjofy.exe")) { throw "Banjofy.exe missing" }
          if (-not (Test-Path "dist/Banjofy-Module17-Build017/runtime/deno.exe")) { throw "Packaged Deno missing" }
          if (-not (Get-ChildItem "dist/Banjofy-Module17-Build017/yt-dlp-plugins/bgutil-ytdlp-pot-provider/yt_dlp_plugins" -Recurse -Filter "getpot_bgutil*.py")) {
            throw "Packaged portable bgutil plugin missing"
          }

      - name: Upload complete Windows package
        uses: actions/upload-artifact@v4
        with:
          name: Banjofy-006.4.0-Module-17-Integration-Build-017-Windows
          path: dist/Banjofy-Module17-Build017
          if-no-files-found: error

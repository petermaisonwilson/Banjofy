name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install latest yt-dlp
        run: python -m pip install --upgrade yt-dlp

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Verify clean replacement exists
        shell: pwsh
        run: |
          if (-not (Test-Path "replacements/module13/main_window.py")) {
            throw "Clean Module 13 replacement file is missing"
          }

      - name: Preserve existing window source
        shell: pwsh
        run: |
          Copy-Item "src/banjofy/ui/main_window.py" "src/banjofy/ui/main_window_legacy.py" -Force

      - name: Install clean Module 13 window
        shell: pwsh
        run: |
          Copy-Item "replacements/module13/main_window.py" "src/banjofy/ui/main_window.py" -Force

      - name: Compile-check replacement source
        run: python -m py_compile src/banjofy/ui/main_window.py

      - name: Build EXE
        run: pyinstaller Banjofy.spec

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Banjofy-Windows
          path: dist/Banjofy.exe

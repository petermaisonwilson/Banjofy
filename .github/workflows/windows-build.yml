name: Build Windows EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install latest yt-dlp
        run: python -m pip install --upgrade yt-dlp
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Install PyInstaller
        run: python -m pip install pyinstaller
      - name: Apply confirmed Module 11 baseline
        run: python tools/apply_module_11.py
      - name: Apply Module 12 grid seeking
        run: python tools/apply_module_12.py
      - name: Apply Module 12A download compatibility
        run: python tools/apply_module_12a.py
      - name: Apply Module 13 repeat selection
        run: python tools/apply_module_13.py
      - name: Apply Module 13A count-in behaviour
        run: python tools/apply_module_13a.py
      - name: Apply Module 13B startup fix
        run: python tools/apply_module_13b.py
      - name: Apply Module 13C Play fix
        run: python tools/apply_module_13c.py
      - name: Build EXE
        run: pyinstaller Banjofy.spec
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Banjofy-Windows
          path: dist/Banjofy.exe

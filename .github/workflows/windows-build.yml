name: Build Banjofy Module 17 Build 019

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      PYTHONPATH: ${{ github.workspace }}\src

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Build 019 clean-rebuild files
        shell: pwsh
        run: |
          $required = @(
            "replacements/module17integration/main_window.py",
            "replacements/module17integration/timing_analyzer.py",
            "replacements/module17integration/chord_engine.py",
            "replacements/module17integration/audio_downloader.py",
            "replacements/module17integration/requirements.txt",
            "replacements/module17integration/Banjofy_Module17.spec",
            "replacements/module17integration/RUNTIME_VERSIONS.json"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Missing Build 019 file: $file" }
          }

      - name: Preserve repository window
        shell: pwsh
        run: Copy-Item "src/banjofy/ui/main_window.py" "src/banjofy/ui/main_window_legacy.py" -Force

      - name: Install complete Build 019 source
        shell: pwsh
        run: |
          Copy-Item "replacements/module17integration/main_window.py" "src/banjofy/ui/main_window.py" -Force
          Copy-Item "replacements/module17integration/timing_analyzer.py" "src/banjofy/ui/timing_analyzer.py" -Force
          Copy-Item "replacements/module17integration/chord_engine.py" "src/banjofy/analysis/chord_engine.py" -Force
          Copy-Item "replacements/module17integration/audio_downloader.py" "src/banjofy/download/audio_downloader.py" -Force
          Copy-Item "replacements/module17integration/requirements.txt" "requirements.txt" -Force
          Copy-Item "replacements/module17integration/Banjofy_Module17.spec" "Banjofy_Module17.spec" -Force

      - name: Clone dedicated ChordMini model
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ptnghia-j/ChordMini.git ChordMini
          if ($LASTEXITCODE -ne 0) { throw "ChordMini clone failed" }
          if (-not (Test-Path "ChordMini/checkpoints/2e1d_model_best.pth")) { throw "ChordNet checkpoint missing" }
          if (-not (Test-Path "ChordMini/src/evaluation/test.py")) { throw "ChordMini inference script missing" }
          if (-not (Test-Path "ChordMini/config/ChordMini.yaml")) { throw "ChordMini configuration missing" }

      - name: Install pinned Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          if ($LASTEXITCODE -ne 0) { throw "pip and wheel upgrade failed" }
          python -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) { throw "requirements installation failed" }
          python -m pip install pyinstaller==6.14.2
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller installation failed" }

      - name: Verify application dependencies and imports
        shell: pwsh
        run: |
          python -c "import torch, librosa, numpy, scipy.signal, mir_eval, imageio_ffmpeg, seaborn, pandas, matplotlib, tqdm, soundfile, yaml; print('Laboratory runtime imports: passed')"
          if ($LASTEXITCODE -ne 0) { throw "Laboratory runtime imports failed" }
          python -c "from banjofy.ui.main_window import MainWindow; from banjofy.ui.timing_analyzer import TimingAnalyzer; from banjofy.analysis.chord_engine import ChordEngine; from banjofy.download.audio_downloader import DownloadManager; print('Banjofy application imports: passed')"
          if ($LASTEXITCODE -ne 0) { throw "Banjofy application import failed" }

      - name: Prepare External Acquisition Agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "Acquisition/runtime" | Out-Null
          New-Item -ItemType Directory -Force "Acquisition/yt-dlp-plugins/bgutil-ytdlp-pot-provider" | Out-Null

          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/download/2026.06.09/yt-dlp.exe" `
            -OutFile "Acquisition/yt-dlp.exe"
          if (-not (Test-Path "Acquisition/yt-dlp.exe")) { throw "Official yt-dlp.exe missing" }

          Invoke-WebRequest `
            -Uri "https://github.com/denoland/deno/releases/download/v2.8.1/deno-x86_64-pc-windows-msvc.zip" `
            -OutFile "Acquisition/deno.zip"
          Expand-Archive "Acquisition/deno.zip" -DestinationPath "Acquisition" -Force
          Remove-Item "Acquisition/deno.zip"
          if (-not (Test-Path "Acquisition/deno.exe")) { throw "deno.exe missing" }

          python -c "import imageio_ffmpeg, pathlib, shutil; src=pathlib.Path(imageio_ffmpeg.get_ffmpeg_exe()); dst=pathlib.Path('Acquisition/ffmpeg.exe'); shutil.copy2(src,dst); print(src, '->', dst)"
          if ($LASTEXITCODE -ne 0) { throw "FFmpeg staging failed" }
          if (-not (Test-Path "Acquisition/ffmpeg.exe")) { throw "ffmpeg.exe missing" }

          git clone --depth 1 --branch 1.3.1 `
            https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git `
            "Acquisition/runtime/bgutil-ytdlp-pot-provider"
          if ($LASTEXITCODE -ne 0) { throw "bgutil provider clone failed" }

          Push-Location "Acquisition/runtime/bgutil-ytdlp-pot-provider/server"
          & "$env:GITHUB_WORKSPACE/Acquisition/deno.exe" install --allow-scripts=npm:canvas --frozen
          if ($LASTEXITCODE -ne 0) { throw "bgutil provider dependency installation failed" }
          Pop-Location

          python -c "import importlib.metadata as m, pathlib, shutil; d=m.distribution('bgutil-ytdlp-pot-provider'); files=[f for f in (d.files or []) if 'yt_dlp_plugins' in f.parts and f.suffix=='.py']; assert files; root=pathlib.Path('Acquisition/yt-dlp-plugins/bgutil-ytdlp-pot-provider'); [(lambda src,dst: (dst.parent.mkdir(parents=True, exist_ok=True), shutil.copy2(src,dst)))(pathlib.Path(d.locate_file(f)), root/pathlib.Path(*f.parts[f.parts.index('yt_dlp_plugins'):])) for f in files]; print('\n'.join(str(root/pathlib.Path(*f.parts[f.parts.index('yt_dlp_plugins'):])) for f in files))"
          if ($LASTEXITCODE -ne 0) { throw "External agent plugin staging failed" }

      - name: Test External Acquisition Agent as a separate product
        shell: pwsh
        run: |
          & "Acquisition/yt-dlp.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "yt-dlp executable self-test failed" }

          & "Acquisition/deno.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "Deno executable self-test failed" }

          & "Acquisition/ffmpeg.exe" -version
          if ($LASTEXITCODE -ne 0) { throw "FFmpeg executable self-test failed" }

          if (-not (Get-ChildItem "Acquisition/yt-dlp-plugins" -Recurse -Filter "getpot_bgutil*.py")) {
            throw "External agent bgutil plugin files missing"
          }
          if (-not (Test-Path "Acquisition/runtime/bgutil-ytdlp-pot-provider/server/node_modules")) {
            throw "External agent provider dependencies missing"
          }

          python -c "from banjofy.download.audio_downloader import DownloadManager; m=DownloadManager(); h=m.health_check(); print(h); assert h['ready']; cmd=m._command(type('R', (), {'url':'https://example.invalid/test'})(), __import__('pathlib').Path('Audio'), 'test'); assert cmd[0].endswith('Acquisition\\\\yt-dlp.exe'); assert '--plugin-dirs' in cmd; assert '--js-runtimes' in cmd; assert '--ffmpeg-location' in cmd; print('Banjofy-to-EAA handoff: passed')"
          if ($LASTEXITCODE -ne 0) { throw "Banjofy-to-EAA handoff failed" }

      - name: Compile and internal audits
        shell: pwsh
        run: |
          python -m py_compile src/main.py
          python -m py_compile src/banjofy/ui/main_window.py
          python -m py_compile src/banjofy/ui/timing_analyzer.py
          python -m py_compile src/banjofy/analysis/chord_engine.py
          python -m py_compile src/banjofy/download/audio_downloader.py
          python -c "from banjofy.analysis import chord_engine as c; print('\n'.join(c.run_internal_self_audit()))"
          python -c "from banjofy.ui import timing_analyzer as t; print('\n'.join(t.run_internal_timing_audit()))"

      - name: Verify ChordMini import and runtime assets
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$env:GITHUB_WORKSPACE/src;$env:GITHUB_WORKSPACE/ChordMini"
          python -c "from src.evaluation.utils import quality_analysis; from src.models import load_model; print('ChordMini imports: passed')"
          if ($LASTEXITCODE -ne 0) { throw "ChordMini import failed" }
          python -c "from banjofy.analysis.chord_engine import chordmini_root; p=chordmini_root(); assert (p/'checkpoints/2e1d_model_best.pth').exists(); assert (p/'src/evaluation/test.py').exists(); assert (p/'config/ChordMini.yaml').exists(); print('ChordMini assets: passed')"
          if ($LASTEXITCODE -ne 0) { throw "ChordMini asset verification failed" }

      - name: Build Windows EXE
        shell: pwsh
        run: |
          pyinstaller Banjofy_Module17.spec
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller build failed" }
          if (-not (Test-Path "dist/Banjofy.exe")) { throw "Banjofy.exe missing after PyInstaller" }

      - name: Smoke-test built Banjofy EXE startup
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "$env:GITHUB_WORKSPACE/dist/Banjofy.exe" -PassThru
          Start-Sleep -Seconds 10
          if ($process.HasExited) {
            throw "Banjofy.exe exited during startup smoke test with code $($process.ExitCode)"
          }
          Stop-Process -Id $process.Id -Force
          Start-Sleep -Seconds 2
          Write-Host "Banjofy.exe startup smoke test passed"

      - name: Assemble complete Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "dist/Banjofy-Module17-Build019" | Out-Null
          Copy-Item "dist/Banjofy.exe" "dist/Banjofy-Module17-Build019/Banjofy.exe" -Force
          Copy-Item "Acquisition" "dist/Banjofy-Module17-Build019/Acquisition" -Recurse -Force
          Copy-Item "replacements/module17integration/RUNTIME_VERSIONS.json" "dist/Banjofy-Module17-Build019/RUNTIME_VERSIONS.json" -Force

          if (-not (Test-Path "dist/Banjofy-Module17-Build019/Banjofy.exe")) { throw "Packaged Banjofy.exe missing" }
          if (-not (Test-Path "dist/Banjofy-Module17-Build019/Acquisition/yt-dlp.exe")) { throw "Packaged EAA yt-dlp missing" }
          if (-not (Test-Path "dist/Banjofy-Module17-Build019/Acquisition/deno.exe")) { throw "Packaged EAA Deno missing" }
          if (-not (Test-Path "dist/Banjofy-Module17-Build019/Acquisition/ffmpeg.exe")) { throw "Packaged EAA FFmpeg missing" }
          if (-not (Get-ChildItem "dist/Banjofy-Module17-Build019/Acquisition/yt-dlp-plugins" -Recurse -Filter "getpot_bgutil*.py")) {
            throw "Packaged EAA plugin missing"
          }

      - name: Test assembled External Acquisition Agent
        shell: pwsh
        run: |
          Push-Location "dist/Banjofy-Module17-Build019"
          & "Acquisition/yt-dlp.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "Packaged yt-dlp failed" }
          & "Acquisition/deno.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "Packaged Deno failed" }
          & "Acquisition/ffmpeg.exe" -version
          if ($LASTEXITCODE -ne 0) { throw "Packaged FFmpeg failed" }
          Pop-Location
          Write-Host "Assembled External Acquisition Agent self-test passed"

      - name: Upload complete Windows package
        uses: actions/upload-artifact@v4
        with:
          name: Banjofy-006.4.0-Module-17-Integration-Build-019-Windows
          path: dist/Banjofy-Module17-Build019
          if-no-files-found: error

name: Build Banjofy Module 17 Build 023

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    env:
      PYTHONPATH: ${{ github.workspace }}\src

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Build 023 clean-rebuild files
        shell: pwsh
        run: |
          $required = @(
            "replacements/module17integration/main_window.py",
            "replacements/module17integration/timing_analyzer.py",
            "replacements/module17integration/chord_engine.py",
            "replacements/module17integration/audio_downloader.py",
            "replacements/module17integration/requirements.txt",
            "replacements/module17integration/Banjofy_Module17.spec",
            "replacements/module17integration/RUNTIME_VERSIONS.json",
            "replacements/module17integration/eaa_release_gate.py"
          )
          foreach ($file in $required) {
            if (-not (Test-Path $file)) { throw "Missing Build 023 file: $file" }
          }

      - name: Preserve repository window
        shell: pwsh
        run: Copy-Item "src/banjofy/ui/main_window.py" "src/banjofy/ui/main_window_legacy.py" -Force

      - name: Install complete Build 023 source
        shell: pwsh
        run: |
          Copy-Item "replacements/module17integration/main_window.py" "src/banjofy/ui/main_window.py" -Force
          Copy-Item "replacements/module17integration/timing_analyzer.py" "src/banjofy/ui/timing_analyzer.py" -Force
          Copy-Item "replacements/module17integration/chord_engine.py" "src/banjofy/analysis/chord_engine.py" -Force
          Copy-Item "replacements/module17integration/audio_downloader.py" "src/banjofy/download/audio_downloader.py" -Force
          Copy-Item "replacements/module17integration/requirements.txt" "requirements.txt" -Force
          Copy-Item "replacements/module17integration/Banjofy_Module17.spec" "Banjofy_Module17.spec" -Force
          Copy-Item "replacements/module17integration/eaa_release_gate.py" "eaa_release_gate.py" -Force

      - name: Clone dedicated ChordMini model
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/ptnghia-j/ChordMini.git ChordMini
          if ($LASTEXITCODE -ne 0) { throw "ChordMini clone failed" }
          if (-not (Test-Path "ChordMini/checkpoints/2e1d_model_best.pth")) { throw "ChordNet checkpoint missing" }
          if (-not (Test-Path "ChordMini/src/evaluation/test.py")) { throw "ChordMini inference script missing" }
          if (-not (Test-Path "ChordMini/config/ChordMini.yaml")) { throw "ChordMini configuration missing" }

      - name: Install pinned Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          if ($LASTEXITCODE -ne 0) { throw "pip and wheel upgrade failed" }
          python -m pip install -r requirements.txt
          if ($LASTEXITCODE -ne 0) { throw "requirements installation failed" }
          python -m pip install pyinstaller==6.14.2
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller installation failed" }

      - name: Verify application dependencies and imports
        shell: pwsh
        run: |
          python -c "import torch, librosa, numpy, scipy.signal, mir_eval, imageio_ffmpeg, seaborn, pandas, matplotlib, tqdm, soundfile, yaml; print('Laboratory runtime imports: passed')"
          if ($LASTEXITCODE -ne 0) { throw "Laboratory runtime imports failed" }
          python -c "from banjofy.ui.main_window import MainWindow; from banjofy.ui.timing_analyzer import TimingAnalysis, TimingAnalyzer; from banjofy.analysis.chord_engine import AnalysisResult, analyse_audio; from banjofy.download.audio_downloader import DownloadManager; assert MainWindow and TimingAnalysis and TimingAnalyzer and AnalysisResult and analyse_audio and DownloadManager; print('Exact Banjofy application imports: passed')"
          if ($LASTEXITCODE -ne 0) { throw "Banjofy application import failed" }

      - name: Verify main window and chord engine API agree
        shell: pwsh
        run: |
          python -c "import ast, pathlib; mw=ast.parse(pathlib.Path('src/banjofy/ui/main_window.py').read_text(encoding='utf-8')); ce=ast.parse(pathlib.Path('src/banjofy/analysis/chord_engine.py').read_text(encoding='utf-8')); requested=set(); exported=set(); [(requested.update(a.name for a in n.names)) for n in mw.body if isinstance(n, ast.ImportFrom) and n.module=='banjofy.analysis.chord_engine']; [(exported.add(n.name)) for n in ce.body if isinstance(n, (ast.FunctionDef, ast.AsyncFunctionDef, ast.ClassDef))]; missing=requested-exported; print('Requested:', sorted(requested)); print('Exported match:', sorted(requested & exported)); assert not missing, f'Main window requests missing chord-engine names: {sorted(missing)}'; print('Main-window/chord-engine API consistency: passed')"
          if ($LASTEXITCODE -ne 0) { throw "Main-window/chord-engine API consistency failed" }

      - name: Prepare External Acquisition Agent
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "Acquisition/runtime" | Out-Null
          New-Item -ItemType Directory -Force "Acquisition/yt-dlp-plugins/bgutil-ytdlp-pot-provider" | Out-Null

          Invoke-WebRequest `
            -Uri "https://github.com/yt-dlp/yt-dlp/releases/download/2026.06.09/yt-dlp.exe" `
            -OutFile "Acquisition/yt-dlp.exe"
          if (-not (Test-Path "Acquisition/yt-dlp.exe")) { throw "Official yt-dlp.exe missing" }

          Invoke-WebRequest `
            -Uri "https://nodejs.org/dist/v22.22.2/node-v22.22.2-win-x64.zip" `
            -OutFile "Acquisition/node.zip"
          Expand-Archive "Acquisition/node.zip" -DestinationPath "Acquisition/node-stage" -Force
          Remove-Item "Acquisition/node.zip"
          Move-Item "Acquisition/node-stage/node-v22.22.2-win-x64" "Acquisition/node"
          Remove-Item "Acquisition/node-stage" -Recurse -Force
          if (-not (Test-Path "Acquisition/node/node.exe")) { throw "Portable Node.js missing" }
          if (-not (Test-Path "Acquisition/node/npm.cmd")) { throw "Portable npm missing" }
          if (-not (Test-Path "Acquisition/node/npx.cmd")) { throw "Portable npx missing" }

          python -c "import imageio_ffmpeg, pathlib, shutil; src=pathlib.Path(imageio_ffmpeg.get_ffmpeg_exe()); dst=pathlib.Path('Acquisition/ffmpeg.exe'); shutil.copy2(src,dst); print(src, '->', dst)"
          if ($LASTEXITCODE -ne 0) { throw "FFmpeg staging failed" }
          if (-not (Test-Path "Acquisition/ffmpeg.exe")) { throw "ffmpeg.exe missing" }

          git clone --depth 1 --branch 1.3.1 `
            https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git `
            "Acquisition/runtime/bgutil-ytdlp-pot-provider"
          if ($LASTEXITCODE -ne 0) { throw "bgutil provider clone failed" }

          Push-Location "Acquisition/runtime/bgutil-ytdlp-pot-provider/server"
          $env:PATH = "$env:GITHUB_WORKSPACE/Acquisition/node;$env:PATH"
          & "$env:GITHUB_WORKSPACE/Acquisition/node/npm.cmd" ci
          if ($LASTEXITCODE -ne 0) { throw "bgutil provider npm ci failed" }
          & "$env:GITHUB_WORKSPACE/Acquisition/node/npx.cmd" tsc
          if ($LASTEXITCODE -ne 0) { throw "bgutil provider TypeScript compilation failed" }
          Pop-Location

          if (-not (Test-Path "Acquisition/runtime/bgutil-ytdlp-pot-provider/server/build/generate_once.js")) {
            throw "Compiled generate_once.js missing"
          }
          if (-not (Test-Path "Acquisition/runtime/bgutil-ytdlp-pot-provider/server/build/main.js")) {
            throw "Compiled main.js missing"
          }

          python -c "import importlib.metadata as m, pathlib, shutil; d=m.distribution('bgutil-ytdlp-pot-provider'); files=[f for f in (d.files or []) if 'yt_dlp_plugins' in f.parts and f.suffix=='.py']; assert files; root=pathlib.Path('Acquisition/yt-dlp-plugins/bgutil-ytdlp-pot-provider'); [(lambda src,dst: (dst.parent.mkdir(parents=True, exist_ok=True), shutil.copy2(src,dst)))(pathlib.Path(d.locate_file(f)), root/pathlib.Path(*f.parts[f.parts.index('yt_dlp_plugins'):])) for f in files]; print('\n'.join(str(root/pathlib.Path(*f.parts[f.parts.index('yt_dlp_plugins'):])) for f in files))"
          if ($LASTEXITCODE -ne 0) { throw "External agent plugin staging failed" }

      - name: Test External Acquisition Agent as a separate product
        shell: pwsh
        run: |
          & "Acquisition/yt-dlp.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "yt-dlp executable self-test failed" }

          & "Acquisition/node/node.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "Node executable self-test failed" }
          & "Acquisition/node/npm.cmd" --version
          if ($LASTEXITCODE -ne 0) { throw "npm executable self-test failed" }

          & "Acquisition/ffmpeg.exe" -version
          if ($LASTEXITCODE -ne 0) { throw "FFmpeg executable self-test failed" }

          if (-not (Get-ChildItem "Acquisition/yt-dlp-plugins" -Recurse -Filter "getpot_bgutil*.py")) {
            throw "External agent bgutil plugin files missing"
          }
          if (-not (Test-Path "Acquisition/runtime/bgutil-ytdlp-pot-provider/server/node_modules")) {
            throw "External agent provider dependencies missing"
          }
          if (-not (Test-Path "Acquisition/runtime/bgutil-ytdlp-pot-provider/server/build/generate_once.js")) {
            throw "External agent compiled generator missing"
          }

          & "Acquisition/node/node.exe" `
            "Acquisition/runtime/bgutil-ytdlp-pot-provider/server/build/generate_once.js" `
            --help
          if ($LASTEXITCODE -ne 0) { throw "Compiled provider generator could not start" }

          python eaa_release_gate.py
          if ($LASTEXITCODE -ne 0) { throw "Banjofy-to-EAA handoff failed" }

      - name: Live External Acquisition Agent provider probe
        shell: pwsh
        run: |
          $output = & "Acquisition/yt-dlp.exe" `
            --ignore-config `
            --verbose `
            --no-playlist `
            --simulate `
            --plugin-dirs "$env:GITHUB_WORKSPACE/Acquisition/yt-dlp-plugins" `
            --js-runtimes "node:$env:GITHUB_WORKSPACE/Acquisition/node/node.exe" `
            --extractor-args "youtube:player_client=mweb;fetch_pot=always;pot_trace=true;jsc_trace=true" `
            --extractor-args "youtubepot-bgutilscript:server_home=$env:GITHUB_WORKSPACE/Acquisition/runtime/bgutil-ytdlp-pot-provider/server" `
            "https://www.youtube.com/watch?v=Y0pdQU87dc8" 2>&1
          $exitCode = $LASTEXITCODE
          $output | ForEach-Object { Write-Host $_ }
          $joined = $output -join "`n"

          $tokenEvidence = (
            $joined -match "Generating a player PO Token" -and
            $joined -match '"poToken"' -and
            $joined -match "Retrieved a player PO Token"
          )

          if (-not $tokenEvidence) {
            throw "Live EAA provider probe did not generate and return a real player PO Token"
          }

          if ($exitCode -ne 0) {
            if ($joined -match "LOGIN_REQUIRED" -or $joined -match "Sign in to confirm") {
              Write-Warning "Provider passed. YouTube rejected the shared GitHub cloud IP after token generation. Peter's Windows network remains the end-to-end acceptance test."
            } else {
              throw "The provider generated a token, but yt-dlp then failed for an unexpected reason"
            }
          }

          Write-Host "Live EAA provider probe passed: compiled provider generated and returned a real PO Token"

      - name: Compile and internal audits
        shell: pwsh
        run: |
          python -m py_compile src/main.py
          python -m py_compile src/banjofy/ui/main_window.py
          python -m py_compile src/banjofy/ui/timing_analyzer.py
          python -m py_compile src/banjofy/analysis/chord_engine.py
          python -m py_compile src/banjofy/download/audio_downloader.py
          python -c "from banjofy.analysis import chord_engine as c; print('\n'.join(c.run_internal_self_audit()))"
          python -c "from banjofy.ui import timing_analyzer as t; print('\n'.join(t.run_internal_timing_audit()))"

      - name: Verify ChordMini import and runtime assets
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$env:GITHUB_WORKSPACE/src;$env:GITHUB_WORKSPACE/ChordMini"
          python -c "from src.evaluation.utils import quality_analysis; from src.models import load_model; print('ChordMini imports: passed')"
          if ($LASTEXITCODE -ne 0) { throw "ChordMini import failed" }
          python -c "from banjofy.analysis.chord_engine import chordmini_root; p=chordmini_root(); assert (p/'checkpoints/2e1d_model_best.pth').exists(); assert (p/'src/evaluation/test.py').exists(); assert (p/'config/ChordMini.yaml').exists(); print('ChordMini assets: passed')"
          if ($LASTEXITCODE -ne 0) { throw "ChordMini asset verification failed" }

      - name: Build Windows EXE
        shell: pwsh
        run: |
          pyinstaller Banjofy_Module17.spec
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller build failed" }
          if (-not (Test-Path "dist/Banjofy.exe")) { throw "Banjofy.exe missing after PyInstaller" }

      - name: Smoke-test built Banjofy EXE startup
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "$env:GITHUB_WORKSPACE/dist/Banjofy.exe" -PassThru
          Start-Sleep -Seconds 10
          if ($process.HasExited) {
            throw "Banjofy.exe exited during startup smoke test with code $($process.ExitCode)"
          }
          Stop-Process -Id $process.Id -Force
          Start-Sleep -Seconds 2
          Write-Host "Banjofy.exe startup smoke test passed"

      - name: Assemble complete Windows package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "dist/Banjofy-Module17-Build023" | Out-Null
          Copy-Item "dist/Banjofy.exe" "dist/Banjofy-Module17-Build023/Banjofy.exe" -Force
          Copy-Item "Acquisition" "dist/Banjofy-Module17-Build023/Acquisition" -Recurse -Force
          Copy-Item "replacements/module17integration/RUNTIME_VERSIONS.json" "dist/Banjofy-Module17-Build023/RUNTIME_VERSIONS.json" -Force

          if (-not (Test-Path "dist/Banjofy-Module17-Build023/Banjofy.exe")) { throw "Packaged Banjofy.exe missing" }
          if (-not (Test-Path "dist/Banjofy-Module17-Build023/Acquisition/yt-dlp.exe")) { throw "Packaged EAA yt-dlp missing" }
          if (-not (Test-Path "dist/Banjofy-Module17-Build023/Acquisition/node/node.exe")) { throw "Packaged EAA Node missing" }
          if (-not (Test-Path "dist/Banjofy-Module17-Build023/Acquisition/runtime/bgutil-ytdlp-pot-provider/server/build/generate_once.js")) { throw "Packaged compiled provider missing" }
          if (-not (Test-Path "dist/Banjofy-Module17-Build023/Acquisition/ffmpeg.exe")) { throw "Packaged EAA FFmpeg missing" }
          if (-not (Get-ChildItem "dist/Banjofy-Module17-Build023/Acquisition/yt-dlp-plugins" -Recurse -Filter "getpot_bgutil*.py")) {
            throw "Packaged EAA plugin missing"
          }

      - name: Test assembled External Acquisition Agent
        shell: pwsh
        run: |
          Push-Location "dist/Banjofy-Module17-Build023"
          & "Acquisition/yt-dlp.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "Packaged yt-dlp failed" }
          & "Acquisition/node/node.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "Packaged Node failed" }
          & "Acquisition/node/node.exe" "Acquisition/runtime/bgutil-ytdlp-pot-provider/server/build/generate_once.js" --help
          if ($LASTEXITCODE -ne 0) { throw "Packaged compiled provider failed" }
          & "Acquisition/ffmpeg.exe" -version
          if ($LASTEXITCODE -ne 0) { throw "Packaged FFmpeg failed" }
          Pop-Location
          Write-Host "Assembled External Acquisition Agent self-test passed"

      - name: Upload complete Windows package
        uses: actions/upload-artifact@v4
        with:
          name: Banjofy-006.4.0-Module-17-Integration-Build-023-Windows
          path: dist/Banjofy-Module17-Build023
          if-no-files-found: error
